.hdr-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.55) 100%);
  z-index: 2;
}
.hdr-light, .hdr-cross { display: none; }
.hdr-content { display: none; }
.app-sub { display: none; }
.dn-title { display: none; }
.dn-katakana { display: none; }
.dn-title-wrap { display: none; }

/* ─── TABS ─── */
.tabs {
  display: flex; gap: 3px;
  margin: 0; padding: 10px 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.tab {
  flex: 1; padding: 10px 6px;
  background: none; border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--ink-dim);
  font-family: 'Cinzel',serif; font-size: 10px;
  font-weight: 700; letter-spacing: 1.5px;
  cursor: pointer; transition: all .2s; text-align: center;
}
.tab.active { background: var(--red); border-color: var(--red); color: var(--ink); }
.tab:not(.active):hover { border-color: var(--border2); color: var(--ink); }

.panel { display: none; }
.panel.active { display: block; animation: fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════════
   PANEL 1 — INPUT
═══════════════════════════════ */
#panel-input { padding-bottom: 80px; }

.date-group { margin-bottom: 0; }

.date-group-header {
  display: flex; align-items: center;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--red-dim);
  position: relative;
  background: linear-gradient(180deg, rgba(120,18,18,0.12) 0%, transparent 100%);
  gap: 10px;
}
.date-group-header::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--red);
}
.date-label {
  font-family: 'Cinzel',serif; font-size: 12px;
  color: var(--gold); letter-spacing: 2px; flex: 1;
}
.date-edit-input {
  background: transparent; border: none;
  border-bottom: 1px solid var(--gold-dim);
  color: var(--gold); font-family: 'Cinzel',serif;
  font-size: 12px; letter-spacing: 2px;
  outline: none; padding: 2px 4px; flex: 1;
}
.hdr-btn {
  background: none; border: 1px solid var(--border2);
  border-radius: 2px; padding: 5px 10px;
  color: var(--ink-faint); font-family: 'Cinzel',serif;
  font-size: 9px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
.hdr-btn.del-date:hover { border-color: var(--red); color: var(--red); }

/* vocab rows */
.group-rows { padding: 0 10px 0 10px; position: relative; overflow: hidden; }
.group-rows::before {
  content: ''; position: absolute;
  left: 32px; top: 0; bottom: 0; width: 1px;
  background: rgba(180,30,30,0.15); pointer-events: none;
}

.vrow {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 0; border-bottom: 1px solid rgba(60,54,40,0.5);
  min-width: 0;
}
.vrow-num {
  font-family: 'Cinzel',serif; font-size: 9px;
  color: var(--red-dim); width: 16px; text-align: right;
  flex-shrink: 0; padding-left: 2px;
}
.vrow-fields { flex: 1; display: flex; gap: 5px; min-width: 0; overflow: hidden; }
.vfield {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 2px; padding: 8px 6px;
  color: var(--ink); font-family: 'Special Elite',cursive;
  font-size: 16px; outline: none; transition: border-color .2s; flex: 1;
  min-width: 0; width: 0;
}
.vfield:focus { border-color: var(--gold-dim); }
.vfield::placeholder { color: var(--ink-faint); }
.vfield.wf { flex: 1; }
.vfield.mf { flex: 1.2; font-size: 12px; color: var(--ink-dim); }
.vrow-btns { display: flex; gap: 3px; flex-shrink: 0; }
.ibtn {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 2px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; color: var(--ink-dim);
  transition: all .15s;
}
.ibtn:hover { border-color: var(--border2); color: var(--ink); }
.ibtn.speak:hover { background: rgba(71,200,255,0.1); border-color: #47c8ff; color: #47c8ff; }
.ibtn.del:hover { background: rgba(180,30,30,0.1); border-color: var(--red); color: var(--red); }

.add-row-btn {
  margin: 8px 16px 0; background: none;
  border: 1px dashed var(--border); border-radius: 2px;
  padding: 9px; color: var(--ink-faint);
  font-family: 'IM Fell English',serif; font-style: italic; font-size: 12px;
  cursor: pointer; width: calc(100% - 32px);
  transition: all .2s; text-align: center;
}
.add-row-btn:hover { border-color: var(--border2); color: var(--ink-dim); }

.group-divider {
  height: 1px; background: var(--border);
  margin: 0;
}

/* bottom action bar */
.input-actions {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px 24px;
  background: var(--bg);
  display: flex; gap: 8px; z-index: 100; flex-wrap: wrap;
  border-top: 1px solid var(--border);
}

.btn-export {
  background: var(--paper); border: 1px solid var(--gold-dim);
  border-radius: 2px; padding: 10px 14px;
  color: var(--gold-dim); font-family: "Cinzel",serif;
  font-size: 10px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s; flex: 1;
}
.btn-export:hover { border-color: var(--gold); color: var(--gold); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 1000; align-items: center; justify-content: center;
  padding: 20px; display: none;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--paper2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 24px; width: 100%; max-width: 480px;
}
.modal-title { font-family:"Cinzel",serif; font-size:13px; letter-spacing:2px; color:var(--gold); margin-bottom:14px; }
.modal-textarea {
  width: 100%; background: var(--paper); border: 1px solid var(--border2);
  border-radius: 4px; padding: 12px; color: var(--ink);
  font-family: "Special Elite",cursive; font-size: 11px;
  min-height: 100px; resize: none; outline: none; margin-bottom: 12px;
}
.modal-textarea:focus { border-color: var(--gold-dim); }
.modal-btns { display: flex; gap: 8px; }
.modal-btn-primary {
  background: var(--red); border: none; border-radius: 3px;
  padding: 10px 20px; color: var(--ink);
  font-family: "Cinzel",serif; font-size: 11px; font-weight: 700;
  cursor: pointer; flex: 1;
}
.modal-btn-secondary {
  background: var(--paper); border: 1px solid var(--border2); border-radius: 3px;
  padding: 10px 20px; color: var(--ink-dim);
  font-family: "Cinzel",serif; font-size: 11px;
  cursor: pointer;
}
.btn-add-date {
  background: var(--paper2); border: 1px solid var(--border2);
  border-radius: 2px; padding: 12px 16px;
  color: var(--ink-dim); font-family: 'Cinzel',serif;
  font-size: 10px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s; flex: 1;
}
.btn-add-date:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
.btn-read-all {
  background: var(--paper2); border: 1px solid var(--border2);
  border-radius: 2px; padding: 12px 16px;
  color: var(--ink-dim); font-family: 'Cinzel',serif;
  font-size: 10px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s; flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-read-all:hover { border-color: #47c8ff; color: #47c8ff; }
.btn-read-all.reading { color: #47c8ff; border-color: #47c8ff; animation: pulse 1.2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ═══════════════════════════════
   PANEL 2 — FLASHCARD
═══════════════════════════════ */
#panel-cards { padding: 24px 16px 80px; }

.fc-date-filter {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
}
.fc-date-pill {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 14px;
  color: var(--ink-dim); font-family: 'Cinzel',serif;
  font-size: 10px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s;
}
.fc-date-pill.active { background: var(--red); border-color: var(--red); color: var(--ink); }

.card-counter {
  font-family: 'Special Elite',cursive; font-size: 11px;
  color: var(--ink-faint); text-align: center; margin-bottom: 18px;
  letter-spacing: 1px;
}
.card-scene { perspective: 1200px; margin-bottom: 20px; cursor: pointer; }
.card-inner {
  position: relative; width: 100%; height: 210px;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 4px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px; gap: 10px;
}
.card-front {
  background: var(--paper); border: 1px solid var(--border);
  border-left: 3px solid var(--red-dim);
}
.card-back {
  background: linear-gradient(135deg,#1a1008,#0e1520);
  border: 1px solid #2a3040;
  border-left: 3px solid #47c8ff;
  transform: rotateY(180deg);
}
.card-lbl { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--ink-faint); }
.card-word { font-family:'Cinzel',serif; font-size:32px; font-weight:700; color:var(--gold); letter-spacing:1px; text-align:center; }
.card-hint { font-family:'IM Fell English',serif; font-style:italic; font-size:11px; color:var(--ink-faint); }
.card-meaning { font-family:'IM Fell English',serif; font-size:17px; color:#47c8ff; text-align:center; }
.card-date-tag { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--ink-faint); }

.card-controls { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
.nav-btn {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 2px; padding: 10px;
  color: var(--ink-dim); font-family: 'Cinzel',serif;
  font-size: 10px; letter-spacing: 1px;
  cursor: pointer; transition: all .15s;
}
.nav-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
.speak-card {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 2px; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--ink-dim);
  transition: all .15s;
}
.speak-card:hover { border-color: #47c8ff; color: #47c8ff; }

/* ═══════════════════════════════
   PANEL 3 — QUIZ
═══════════════════════════════ */
#panel-quiz { padding: 20px 16px 80px; }

/* date selector */
.quiz-sel-title {
  font-family: 'Cinzel',serif; font-size: 10px;
  letter-spacing: 3px; color: var(--ink-faint);
  margin-bottom: 14px; text-align: center;
}
.quiz-date-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.qd-card {
  background: var(--paper); border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  padding: 14px 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: all .15s; border-radius: 2px;
}
.qd-card:hover { background: var(--paper2); border-color: var(--border2); border-left-color: var(--red); }
.qd-card.selected { border-left-color: var(--red); background: rgba(140,20,20,0.1); border-color: var(--red-dim); }
.qd-date { font-family:'Cinzel',serif; font-size:13px; color:var(--gold); letter-spacing:1px; }
.qd-words { font-family:'IM Fell English',serif; font-style:italic; font-size:11px; color:var(--ink-dim); margin-top:3px; }
.qd-count { font-family:'Special Elite',cursive; font-size:11px; color:var(--ink-faint); }
.qd-check { color:var(--red); font-size:16px; opacity:0; transition:opacity .2s; }
.qd-card.selected .qd-check { opacity:1; }

.btn-start-quiz {
  background: var(--red); border: none; border-radius: 2px;
  padding: 14px; color: var(--ink);
  font-family: 'Cinzel',serif; font-size: 12px;
  font-weight: 700; letter-spacing: 2px;
  cursor: pointer; width: 100%; transition: all .15s;
  display: none; margin-bottom: 24px;
}
.btn-start-quiz:hover { background: #e02222; }
.btn-start-quiz.show { display: block; }

/* quiz active */
.quiz-active { display: none; }
.quiz-active.show { display: block; }

.q-progress-bar { height: 2px; background: var(--border); margin-bottom: 24px; border-radius: 99px; }
.q-progress-fill { height: 100%; background: var(--red); border-radius: 99px; transition: width .4s ease; }
.q-counter { font-family:'Special Elite',cursive; font-size:11px; color:var(--ink-faint); text-align:right; margin-bottom:16px; }

.qtag {
  display: inline-block; font-family:'Cinzel',serif;
  font-size:9px; letter-spacing:3px; color:var(--red);
  border:1px solid var(--red-dim); padding:3px 10px;
  margin-bottom:16px;
}

/* fill */
.fill-box {
  background: var(--paper); border: 1px solid var(--border);
  border-left: 3px solid var(--red-dim);
  padding:18px 16px; font-family:'IM Fell English',serif;
  font-size:16px; color:var(--ink); line-height:2.4;
  margin-bottom:12px; border-radius:2px;
}
.blank-in {
  background: transparent; border: none;
  border-bottom: 2px solid var(--gold);
  padding: 2px 8px; color: var(--gold);
  font-family: 'Special Elite',cursive; font-size:16px;
  outline: none; min-width:100px; text-align:center;
}
.blank-in.ok { border-bottom-color:var(--success); color:var(--success); }
.blank-in.bad { border-bottom-color:var(--red); color:#e88; }

/* sentence */
.sp-box {
  background: var(--paper); border:1px solid var(--border);
  border-left:3px solid var(--gold-dim);
  padding:16px; margin-bottom:12px; border-radius:2px;
}
.sp-lbl { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--gold-dim); margin-bottom:8px; }
.sp-word { font-family:'Cinzel',serif; font-size:20px; color:var(--gold); margin-bottom:4px; }
.sp-meaning { font-family:'IM Fell English',serif; font-style:italic; font-size:12px; color:var(--ink-dim); }

.q-hint { font-family:'IM Fell English',serif; font-style:italic; font-size:12px; color:var(--ink-dim); margin-bottom:14px; }

.stxt {
  background: var(--paper); border:1px solid var(--border2); border-radius:2px;
  padding:13px; color:var(--ink);
  font-family:'Special Elite',cursive; font-size:14px;
  width:100%; resize:none; outline:none; min-height:85px; line-height:1.7;
  transition:border-color .2s;
}
.stxt:focus { border-color:var(--gold-dim); }
.stxt::placeholder { color:var(--ink-faint); font-style:italic; }

.q-actions { display:flex; gap:8px; margin-top:12px; }
.btn-check {
  background:var(--red); border:none; border-radius:2px;
  padding:12px 20px; color:var(--ink);
  font-family:'Cinzel',serif; font-size:11px; font-weight:700; letter-spacing:1px;
  cursor:pointer; flex:1; transition:all .15s;
}
.btn-check:hover { background:#e02222; }
.btn-skip {
  background:var(--paper); border:1px solid var(--border2); border-radius:2px;
  padding:12px 16px; color:var(--ink-dim);
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px;
  cursor:pointer; transition:all .15s;
}
.btn-skip:hover { border-color:var(--ink-dim); color:var(--ink); }

.qfb {
  margin-top:12px; padding:12px 14px; border-radius:2px;
  font-family:'IM Fell English',serif; font-size:14px; line-height:1.6;
  display:none; border-left:3px solid transparent;
}
.qfb.show { display:block; }
.qfb.ok { background:rgba(40,120,80,.1); border-left-color:var(--success); color:#6bcf9a; }
.qfb.bad { background:rgba(180,30,30,.1); border-left-color:var(--red); color:#e88; }
.qfb.skip { background:rgba(200,168,75,.07); border-left-color:var(--gold-dim); color:var(--gold); }

.btn-next {
  background:var(--paper2); border:1px solid var(--border2); border-radius:2px;
  padding:12px; color:var(--ink);
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
  cursor:pointer; width:100%; margin-top:10px; transition:all .15s; display:none;
}
.btn-next.show { display:block; }
.btn-next:hover { border-color:var(--gold-dim); color:var(--gold); }

/* score */
.score-wrap { text-align:center; padding:50px 24px; }
.score-kira { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--red); margin-bottom:18px; }
.score-big { font-family:'Cinzel',serif; font-size:72px; font-weight:900; color:var(--gold); line-height:1; margin-bottom:6px; }
.score-pct { font-size:20px; }
.score-lbl { font-family:'IM Fell English',serif; font-style:italic; font-size:13px; color:var(--ink-dim); margin-bottom:28px; }
.score-stats { display:flex; justify-content:center; gap:36px; margin-bottom:28px; }
.ss-n { font-family:'Cinzel',serif; font-size:26px; font-weight:700; }
.ss-l { font-family:'IM Fell English',serif; font-style:italic; font-size:11px; color:var(--ink-dim); margin-top:3px; }
.s-ok { color:var(--success); } .s-bad { color:var(--red); }
.btn-retry {
  background:var(--red); border:none; border-radius:2px;
  padding:12px 32px; color:var(--ink);
  font-family:'Cinzel',serif; font-size:11px; font-weight:700; letter-spacing:2px;
  cursor:pointer; transition:all .15s; margin: 0 6px 10px;
}
.btn-retry:hover { background:#e02222; }
.btn-back-sel {
  background:var(--paper); border:1px solid var(--border2); border-radius:2px;
  padding:12px 32px; color:var(--ink-dim);
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
  cursor:pointer; transition:all .15s; margin:0 6px;
}
.btn-back-sel:hover { border-color:var(--gold-dim); color:var(--gold); }

.empty-msg { text-align:center; padding:48px 20px; color:var(--ink-faint); font-style:italic; font-size:14px; line-height:2.2; }

/* PANEL 4 PROGRESS */
#panel-progress { padding: 20px 16px 80px; }
.prog-section-title { font-family:"Cinzel",serif; font-size:9px; letter-spacing:4px; color:var(--ink-faint); margin-bottom:14px; }
.prog-table { width:100%; border-collapse:collapse; margin-bottom:32px; }
.prog-table th { font-family:"Cinzel",serif; font-size:9px; letter-spacing:2px; color:var(--ink-faint); text-align:left; padding:8px 10px; border-bottom:1px solid var(--border2); }
.prog-table td { padding:11px 10px; border-bottom:1px solid var(--border); font-family:"Special Elite",cursive; font-size:13px; vertical-align:middle; }
.prog-table tr:hover td { background:var(--paper); }
.td-date { font-family:"Cinzel",serif; font-size:11px; color:var(--gold); letter-spacing:1px; white-space:nowrap; }
.badge-done { font-family:"Cinzel",serif; font-size:9px; letter-spacing:1px; color:var(--success); border:1px solid var(--success); padding:3px 8px; border-radius:99px; }
.badge-pending { font-family:"Cinzel",serif; font-size:9px; letter-spacing:1px; color:var(--ink-faint); border:1px solid var(--border2); padding:3px 8px; border-radius:99px; }
.td-score { font-family:"Cinzel",serif; font-size:14px; font-weight:700; text-align:center; }
.td-score.s-high { color:var(--success); } .td-score.s-mid { color:var(--gold); } .td-score.s-low { color:var(--red); }
.td-frac { font-family:"Special Elite",cursive; font-size:10px; color:var(--ink-faint); text-align:center; }
.chart-wrap { background:var(--paper); border:1px solid var(--border); border-radius:3px; padding:20px 16px 12px; }
.chart-canvas { width:100%; height:160px; display:block; }
.prog-clear-btn { background:none; border:1px solid var(--border); border-radius:2px; padding:8px 16px; color:var(--ink-faint); font-family:"Cinzel",serif; font-size:9px; letter-spacing:2px; cursor:pointer; transition:all .15s; margin-top:16px; display:block; width:100%; text-align:center; }
.prog-clear-btn:hover { border-color:var(--red-dim); color:var(--red); }

<body>

<div class="app-header">
  <div class="hdr-bg"></div>
  <div class="hdr-overlay"></div>
  <div class="hdr-light"></div>
  <div class="hdr-cross"></div>
  <div class="hdr-content">
    <div class="dn-title-wrap">
      <div class="dn-title">DEATH NOTE</div>
    </div>
    <span class="dn-katakana">デスノート</span>
    <span class="app-sub">— the names of those who study shall be remembered —</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('input')">① INPUT</button>
  <button class="tab" onclick="switchTab('cards')">② FLASHCARD</button>
  <button class="tab" onclick="switchTab('quiz')">③ QUIZ</button>
  <button class="tab" onclick="switchTab('progress')">④ PROGRESS</button>
</div>

<!-- ══ PANEL 1: INPUT ══ -->
<div id="panel-input" class="panel active">
  <div id="dateGroups"></div>
  <div class="input-actions">
    <button class="btn-add-date" onclick="addDateGroup()">+ NEW DATE</button>
    <button class="btn-read-all" id="readAllBtn" onclick="toggleReadAll()">
      <span id="readIcon">▶</span><span id="readLbl">READ ALL</span>
    </button>
    <button class="btn-export" onclick="showExport()">⬆ EXPORT</button>
    <button class="btn-export" onclick="showImport()" style="border-color:var(--accent2);color:var(--accent2)">⬇ IMPORT</button>
  </div>

  <!-- Export Modal -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal-box">
      <div class="modal-title">EXPORT VOCAB</div>
      <p style="font-family:'IM Fell English',serif;font-style:italic;font-size:12px;color:var(--ink-dim);margin-bottom:12px">Copy kode ini → paste di device lain → Import</p>
      <textarea class="modal-textarea" id="exportCode" readonly onclick="this.select()"></textarea>
      <div class="modal-btns">
        <button class="modal-btn-primary" onclick="copyExportCode()">COPY CODE</button>
        <button class="modal-btn-secondary" onclick="closeModal('exportModal')">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="importModal">
    <div class="modal-box">
      <div class="modal-title">IMPORT VOCAB</div>
      <p style="font-family:'IM Fell English',serif;font-style:italic;font-size:12px;color:var(--ink-dim);margin-bottom:12px">Paste kode dari device lain di bawah ini</p>
      <textarea class="modal-textarea" id="importCode" placeholder="Paste code here..."></textarea>
      <div class="modal-btns">
        <button class="modal-btn-primary" onclick="doImport()">IMPORT</button>
        <button class="modal-btn-secondary" onclick="closeModal('importModal')">CANCEL</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ PANEL 2: FLASHCARD ══ -->
<div id="panel-cards" class="panel">
  <div class="fc-date-filter" id="fcFilter"></div>
  <div class="card-counter" id="cardCounter"></div>
  <div id="cardsContent"></div>
</div>

<!-- ══ PANEL 4: PROGRESS ══ -->
<div id="panel-progress" class="panel">
  <div class="prog-section-title">QUIZ HISTORY &amp; SCORE</div>
  <table class="prog-table" id="progTable">
    <thead><tr><th>DATE</th><th>STATUS</th><th style="text-align:center">SCORE</th><th style="text-align:center">CORRECT/TOTAL</th></tr></thead>
    <tbody id="progTbody"></tbody>
  </table>
  <div class="prog-section-title">SCORE PROGRESS</div>
  <div class="chart-wrap">
    <canvas class="chart-canvas" id="progChart"></canvas>
  </div>
  <button class="prog-clear-btn" onclick="clearHistory()">CLEAR QUIZ HISTORY</button>
</div>

<!-- ══ PANEL 3: QUIZ ══ -->
<div id="panel-quiz" class="panel">
  <div id="quizSelArea">
    <div class="quiz-sel-title">SELECT DATE TO QUIZ</div>
    <div class="quiz-date-cards" id="quizDateCards"></div>
    <button class="btn-start-quiz" id="btnStartQuiz" onclick="startQuiz()">BEGIN QUIZ →</button>
  </div>
  <div class="quiz-active" id="quizActive">
    <div class="q-progress-bar"><div class="q-progress-fill" id="qpf"></div></div>
    <div class="q-counter" id="qCounter"></div>
    <div id="quizContent"></div>
  </div>
</div>

<script>
// ══════════════ STATE ══════════════
const KEY = 'deathnote_v3';
const HIST_KEY = 'deathnote_hist';  // {date: [{correct,total,ts}]}
let hist = {};
let db = {}; // { dateStr: [{word,meaning},...] }
let selectedQuizDate = null;
let quizQueue = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizAnswered = false;
let isReading = false;

// flashcard state
let fcAllVocab = []; // [{word,meaning,date}]
let fcFiltered = [];
let fcIndex = 0;
let fcFlipped = false;
let fcDateFilter = 'all';

function load() { try { const s=localStorage.getItem(KEY); if(s) db=JSON.parse(s); } catch(e){} try { const h=localStorage.getItem(HIST_KEY); if(h) hist=JSON.parse(h); } catch(e){} }
function save() { localStorage.setItem(KEY, JSON.stringify(db)); }
function saveHist() { localStorage.setItem(HIST_KEY, JSON.stringify(hist)); }

// ══════════════ TABS ══════════════
function switchTab(name) {
  stopReadAll();
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['input','cards','quiz','progress'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='input') renderGroups();
  if(name==='cards') { buildFCVocab(); renderFCFilter(); renderCard(); }
  if(name==='quiz') { renderQuizSel(); }
  if(name==='progress') { renderProgress(); }
}

// ══════════════ INPUT PANEL ══════════════
function renderGroups() {
  const c = document.getElementById('dateGroups');
  const dates = Object.keys(db).sort((a,b)=>a.localeCompare(b));
  if(!dates.length) { c.innerHTML=`<div class="empty-msg">No entries yet.<br>Tap "+ NEW DATE" to begin.</div>`; return; }
  c.innerHTML = '';
  dates.forEach(d => c.appendChild(buildGroup(d)));
}

function buildGroup(d) {
  const wrap = document.createElement('div');
  wrap.className = 'date-group';
  wrap.dataset.date = d;

  const hdr = document.createElement('div');
  hdr.className = 'date-group-header';
  hdr.innerHTML = `
    <div class="date-label" id="dlabel-${d}">${fmt(d)}</div>
    <button class="hdr-btn" onclick="addRowToDate('${d}')">+ ADD ROW</button>
    <button class="hdr-btn del-date" onclick="deleteDate('${d}')">✕ DATE</button>`;
  wrap.appendChild(hdr);

  const rows = document.createElement('div');
  rows.className = 'group-rows';
  rows.id = `rows-${d}`;
  wrap.appendChild(rows);

  renderRows(d, rows);

  const div = document.createElement('div');
  div.className = 'group-divider';
  wrap.appendChild(div);

  return wrap;
}

function renderRows(d, container) {
  if(!container) container = document.getElementById(`rows-${d}`);
  if(!container) return;
  container.innerHTML = '';
  const entries = db[d] || [];
  entries.forEach((e,i) => {
    const row = document.createElement('div');
    row.className = 'vrow';
    row.innerHTML = `
      <div class="vrow-num">${String(i+1).padStart(2,'0')}</div>
      <div class="vrow-fields">
        <input class="vfield wf" placeholder="word / idiom" value="${esc(e.word)}" oninput="updEntry('${d}',${i},'word',this.value)" />
        <input class="vfield mf" placeholder="meaning" value="${esc(e.meaning)}" oninput="updEntry('${d}',${i},'meaning',this.value)" />
      </div>
      <div class="vrow-btns">
        <button class="ibtn speak" onclick="speakText(db['${d}'][${i}]?.word||'')">🔊</button>
        <button class="ibtn del" onclick="delRow('${d}',${i})">✕</button>
      </div>`;
    container.appendChild(row);
  });
}

function updEntry(d,i,field,val) { if(db[d]) { db[d][i][field]=val; save(); } }

function addRowToDate(d) {
  if(!db[d]) db[d]=[];
  db[d].push({word:'',meaning:''});
  save();
  renderRows(d);
  setTimeout(()=>{
    const rows = document.querySelectorAll(`#rows-${d} .wf`);
    rows[rows.length-1]?.focus();
  },50);
}

function delRow(d,i) {
  if(db[d].length===1) db[d][0]={word:'',meaning:''};
  else db[d].splice(i,1);
  save(); renderRows(d);
}

function deleteDate(d) {
  if(!confirm(`Delete page for ${fmt(d)}?`)) return;
  delete db[d]; save(); renderGroups();
}

function addDateGroup() {
  // find a date not yet in db
  let d = todayStr();
  // if already exists, find next available
  let offset = 0;
  while(db[d] && offset < 365) {
    offset++;
    const dt = new Date(); dt.setDate(dt.getDate()+offset);
    d = dt.toISOString().split('T')[0];
  }
  db[d] = [{word:'',meaning:''},{word:'',meaning:''},{word:'',meaning:''},{word:'',meaning:''},{word:'',meaning:''}];
  save(); renderGroups();
  // scroll to new group
  setTimeout(()=>{
    const el = document.querySelector(`[data-date="${d}"]`);
    el?.scrollIntoView({behavior:'smooth', block:'start'});
  },100);
}

function speakText(t,r=0.85){ if(!t?.trim())return; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=r; window.speechSynthesis.speak(u); }
function speakP(t,r=0.85){ return new Promise(res=>{ if(!t?.trim()){res();return;} const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=r; u.onend=res; u.onerror=res; window.speechSynthesis.speak(u); }); }
const ORDS=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];

async function toggleReadAll() {
  if(isReading){stopReadAll();return;}
  // collect all visible vocab
  const all = [];
  Object.keys(db).sort().forEach(d=>{
    (db[d]||[]).forEach(e=>{ if(e.word&&e.meaning) all.push({...e, date:d}); });
  });
  if(!all.length){alert('No vocab yet!');return;}
  isReading=true;
  const btn=document.getElementById('readAllBtn');
  btn.classList.add('reading');
  document.getElementById('readIcon').textContent='■';
  window.speechSynthesis.cancel();
  for(let i=0;i<all.length;i++){
    if(!isReading)break;
    const{word,meaning}=all[i];
    document.getElementById('readLbl').textContent=`${i+1}/${all.length}`;
    await speakP(`Number ${ORDS[i+1]||i+1}.`,0.9); if(!isReading)break;
    await speakP(word,0.75); if(!isReading)break;
    await new Promise(r=>setTimeout(r,300)); if(!isReading)break;
    await speakP('meaning',0.9); if(!isReading)break;
    await speakP(meaning,0.85); if(!isReading)break;
    await new Promise(r=>setTimeout(r,500));
  }
  stopReadAll();
}
function stopReadAll(){
  isReading=false; window.speechSynthesis.cancel();
  const btn=document.getElementById('readAllBtn');
  if(btn){btn.classList.remove('reading'); document.getElementById('readIcon').textContent='▶'; document.getElementById('readLbl').textContent='READ ALL';}
}

// ── FILL TEMPLATES ──
const FILL_T = [
  w=>`After months of hard work, the team managed to ${w} all their competitors.`,
  w=>`The analyst described the firm's approach as ${w}, setting it apart from others.`,
  w=>`Her ${w} attitude helped her navigate even the most complex situations.`,
  w=>`The results were considered ${w} by every expert who reviewed the data.`,
  w=>`In order to ${w} in such a competitive field, consistency is essential.`,
  w=>`He remained ${w} under pressure, which earned him the respect of his peers.`,
  w=>`The document described the new policy as ${w} in addressing core issues.`,
  w=>`To stay ${w}, the company continuously invested in new technologies.`,
];
function makeSentence(word){
  const t=FILL_T[Math.floor(Math.random()*FILL_T.length)];
  let s=t(word);
  if(!s.toLowerCase().includes(word.toLowerCase())) s=`The expert noted that the situation was clearly ${word}, which changed the outcome entirely.`;
  return s;
}

function startQuiz() {
  if(!selectedQuizDate) return;
  const entries=(db[selectedQuizDate]||[]).filter(e=>e.word&&e.meaning);
  if(!entries.length){alert('No vocab on this date!');return;}

  quizQueue=[];
  entries.forEach(e=>{
    quizQueue.push({type:'fill',word:e.word,meaning:e.meaning});
    quizQueue.push({type:'sentence',word:e.word,meaning:e.meaning});
  });
  shuffle(quizQueue);
  quizIdx=0; quizCorrect=0; quizAnswered=false;

  document.getElementById('quizSelArea').style.display='none';
  document.getElementById('quizActive').classList.add('show');
  renderQ();
}

function renderQ() {
  const body=document.getElementById('quizContent');
  const total=quizQueue.length;
  if(quizIdx>=total){showScore();return;}
  const q=quizQueue[quizIdx];
  const pct=(quizIdx/total*100).toFixed(0);
  document.getElementById('qpf').style.width=pct+'%';
  document.getElementById('qCounter').textContent=`${quizIdx+1} / ${total}`;
  quizAnswered=false;
  if(q.type==='fill') renderFillQ(q,body);
  else renderSentenceQ(q,body);
}

function renderFillQ(q,body) {
  const s=makeSentence(q.word);
  const blanked=s.replace(new RegExp(q.word,'gi'),'___');
  const withInput=blanked.replace('___',`<input class="blank-in" id="binput" placeholder="…" autocomplete="off" onkeydown="if(event.key==='Enter')checkFill()" />`);
  body.innerHTML=`
    <div class="qtag">FILL IN THE BLANK</div>
    <div class="fill-box">${withInput}</div>
    <div class="q-hint">Hint: <em>${q.meaning}</em></div>
    <div class="q-actions">
      <button class="btn-check" onclick="checkFill()">CHECK</button>
      <button class="btn-skip" onclick="skipQ()">SKIP</button>
    </div>
    <div class="qfb" id="qfb"></div>
    <button class="btn-next" id="bnext" onclick="nextQ()">NEXT →</button>`;
  body.dataset.ans=q.word;
  body.dataset.sentence=s;
  setTimeout(()=>document.getElementById('binput')?.focus(),80);
}

function renderSentenceQ(q,body) {
  body.innerHTML=`
    <div class="qtag">CREATE A SENTENCE</div>
    <div class="sp-box">
      <div class="sp-lbl">USE THIS WORD</div>
      <div class="sp-word">${q.word}</div>
      <div class="sp-meaning">${q.meaning}</div>
    </div>
    <textarea class="stxt" id="stxt" placeholder="Write a sentence using this word…" rows="4"></textarea>
    <div class="q-actions">
      <button class="btn-check" onclick="checkSentence('${esc(q.word)}')">SUBMIT</button>
      <button class="btn-skip" onclick="skipQ()">SKIP</button>
    </div>
    <div class="qfb" id="qfb"></div>
    <button class="btn-next" id="bnext" onclick="nextQ()">NEXT →</button>`;
  setTimeout(()=>document.getElementById('stxt')?.focus(),80);
}

function checkFill(){
  if(quizAnswered)return;
  const inp=document.getElementById('binput');
  if(!inp)return;
  const val=inp.value.trim(); if(!val)return;
  quizAnswered=true;
  const ans=document.getElementById('quizContent').dataset.ans;
  const sentence=document.getElementById('quizContent').dataset.sentence;
  const ok=val.toLowerCase()===ans.toLowerCase();
  if(ok)quizCorrect++;
  inp.disabled=true; inp.classList.add(ok?'ok':'bad');
  const fb=document.getElementById('qfb');
  fb.className=`qfb show ${ok?'ok':'bad'}`;
  fb.innerHTML=ok?`✓ Correct. The word is <strong>${ans}</strong>.`
    :`✗ The answer is <strong>${ans}</strong>.<br><em style="opacity:.75">${sentence}</em>`;
  document.getElementById('bnext').classList.add('show');
  speakText(ans);
}

async function checkSentence(word){
  if(quizAnswered)return;
  const inp=document.getElementById('stxt');
  const val=inp?.value.trim(); if(!val)return;
  const has=val.toLowerCase().includes(word.toLowerCase());
  const fb=document.getElementById('qfb');

  if(!has){
    quizAnswered=true; inp.disabled=true;
    fb.className='qfb show bad';
    fb.innerHTML=`✗ Your sentence must contain the word <strong>${word}</strong>.`;
    document.getElementById('bnext').classList.add('show');
    return;
  }

  // Has the word — run grammar check
  quizAnswered=true; inp.disabled=true;
  quizCorrect++;
  fb.className='qfb show ok';
  fb.innerHTML=`✓ Your sentence contains <strong>${word}</strong>. <span style="opacity:0.6;font-size:12px">Checking grammar...</span>`;
  document.getElementById('bnext').classList.add('show');
  speakText(val);

  // Grammar check via Claude API
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: `Check this English sentence for grammar errors. The target word is "${word}" (meaning: vocabulary practice).

Sentence: "${val}"

Reply in JSON only, no markdown:
{"correct": true/false, "corrected": "corrected sentence or same if correct", "explanation": "brief explanation in 1 sentence, or empty string if correct"}`
        }]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/\`\`\`json|\`\`\`/g,'').trim();
    const result = JSON.parse(clean);

    if(result.correct){
      fb.innerHTML=`✓ Your sentence contains <strong>${word}</strong>. <span style="color:var(--success);font-size:12px">✓ Grammar looks good!</span>`;
    } else {
      fb.innerHTML=`✓ Your sentence contains <strong>${word}</strong>.<br>
        <div style="margin-top:8px;padding:10px 12px;background:rgba(200,168,75,0.08);border-left:3px solid var(--gold);border-radius:2px;font-size:13px">
          <span style="color:var(--gold-dim);font-size:10px;letter-spacing:2px;font-family:'Cinzel',serif">GRAMMAR SUGGESTION</span><br>
          <span style="color:var(--gold)">${result.corrected}</span><br>
          <span style="color:var(--ink-dim);font-size:11px;font-style:italic">${result.explanation}</span>
        </div>`;
    }
  } catch(e) {
    // Silently fail — don't block quiz if API fails
    fb.innerHTML=`✓ Your sentence contains <strong>${word}</strong>.`;
  }
}

function skipQ(){
  if(quizAnswered)return;
  quizAnswered=true;
  const fb=document.getElementById('qfb');
  fb.className='qfb show skip'; fb.textContent='Skipped.';
  document.getElementById('bnext').classList.add('show');
}

function nextQ(){ quizIdx++; renderQ(); }

function showScore(){
  const total=quizQueue.length; const wrong=total-quizCorrect;
  const pct=Math.round(quizCorrect/total*100);
  document.getElementById('quizContent').innerHTML=`
    <div class="score-wrap">
      <div class="score-kira">JUDGMENT COMPLETE</div>
      <div class="score-big">${pct}<span class="score-pct">%</span></div>
      <div class="score-lbl">${Math.round(total/2)} word${Math.round(total/2)!==1?'s':''} · ${fmt(selectedQuizDate)}</div>
      <div class="score-stats">
        <div><div class="ss-n s-ok">${quizCorrect}</div><div class="ss-l">Correct</div></div>
        <div><div class="ss-n s-bad">${wrong}</div><div class="ss-l">Wrong</div></div>
      </div>
      <button class="btn-retry" onclick="startQuiz()">RETRY</button>

    </div>`;
  document.getElementById('qpf').style.width='100%';
  // Save to history — first attempt only

    hist[selectedQuizDate].push({correct:quizCorrect,total:quizQueue.length,ts:Date.now()});

// ══════════════ PROGRESS ══════════════
function renderProgress() {
  const dates = Object.keys(db).sort((a,b)=>b.localeCompare(a));
  const tbody = document.getElementById('progTbody');
  tbody.innerHTML = '';
  dates.forEach(d=>{
    const attempts = hist[d]||[];
    const last = attempts[attempts.length-1];
    const done = !!last;
    const pct = done ? Math.round(last.correct/last.total*100) : null;
    const cls = pct===null?'':pct>=80?'s-high':pct>=50?'s-mid':'s-low';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-date">${fmt(d)}</td>
      <td><span class="${done?'badge-done':'badge-pending'}">${done?'✓ DONE':'PENDING'}</span></td>
      <td class="td-score ${cls}">${pct!==null?pct+'%':'—'}</td>
      <td class="td-frac">${done?last.correct+'/'+last.total:'—'}</td>`;
    tbody.appendChild(tr);
  });
  if(!dates.length) tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--ink-faint);padding:32px;font-style:italic">No entries yet.</td></tr>';
  setTimeout(drawChart, 50);
}

function drawChart() {
  const canvas = document.getElementById('progChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const W = canvas.offsetWidth||300;
  const H = 160;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const points = [];
  Object.keys(hist).sort().forEach(d=>{
    const arr = hist[d];
    if(arr&&arr.length) {
      const last = arr[arr.length-1];
      points.push({label:fmtShort(d), pct:Math.round(last.correct/last.total*100)});
    }
  });

  if(!points.length) {
    ctx.fillStyle='#4a4538'; ctx.font='italic 13px serif';
    ctx.textAlign='center'; ctx.fillText('Complete a quiz to see progress',W/2,H/2);
    return;
  }

  const PAD={top:16,right:16,bottom:30,left:36};
  const cW=W-PAD.left-PAD.right;
  const cH=H-PAD.top-PAD.bottom;

  // grid
  [0,25,50,75,100].forEach(v=>{
    const y=PAD.top+cH-(v/100*cH);
    ctx.strokeStyle='rgba(60,54,40,0.7)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(W-PAD.right,y); ctx.stroke();
    ctx.fillStyle='#4a4538'; ctx.font='9px monospace'; ctx.textAlign='right';
    ctx.fillText(v+'%',PAD.left-4,y+3);
  });
  ctx.setLineDash([]);

  const step = points.length>1 ? cW/(points.length-1) : cW/2;
  const pts = points.map((p,i)=>({
    x: PAD.left+(points.length>1?i*step:cW/2),
    y: PAD.top+cH-(p.pct/100*cH)
  }));

  // fill area
  ctx.beginPath();
  ctx.moveTo(pts[0].x, PAD.top+cH);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, PAD.top+cH);
  ctx.closePath();
  ctx.fillStyle='rgba(204,34,34,0.08)'; ctx.fill();

  // line
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='#cc2222'; ctx.lineWidth=2; ctx.stroke();

  // dots + x labels
  pts.forEach((p,i)=>{
    const pct=points[i].pct;
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=pct>=80?'#3d9970':pct>=50?'#c8a84b':'#cc2222'; ctx.fill();
    ctx.strokeStyle='#0d0b08'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#6a6050'; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText(points[i].label, p.x, H-PAD.bottom+14);
  });
}

function fmtShort(d){
  if(!d)return'';
  const[,m,day]=d.split('-');
  const M=['J','F','M','A','M','J','J','A','S','O','N','D'];
  return M[parseInt(m)-1]+parseInt(day);
}

function clearHistory(){
  if(!confirm('Clear all quiz history?')) return;
  hist={}; saveHist(); renderProgress();
}

// ══════════════ UTILS ══════════════
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmt(d){if(!d)return'';const[y,m,day]=d.split('-');const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[parseInt(m)-1]} ${parseInt(day)}, ${y}`;}
function todayStr(){return new Date().toISOString().split('T')[0];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ══════════════ EXPORT / IMPORT ══════════════
function showExport() {
  const data = localStorage.getItem('deathnote_v3') || '{}';
  // Compress to base64
  const code = btoa(unescape(encodeURIComponent(data)));
  document.getElementById('exportCode').value = code;
  document.getElementById('exportModal').classList.add('show');
}

function copyExportCode() {
  const ta = document.getElementById('exportCode');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>{
    const btn = document.querySelector('#exportModal .modal-btn-primary');
    btn.textContent = '✓ COPIED!';
    setTimeout(()=>btn.textContent='COPY CODE', 2000);
  }).catch(()=>{
    ta.select();
    document.execCommand('copy');
  });
}

function showImport() {
  document.getElementById('importCode').value = '';
  document.getElementById('importModal').classList.add('show');
}

function doImport() {
  const code = document.getElementById('importCode').value.trim();
  if(!code) return;
  try {
    const json = decodeURIComponent(escape(atob(code)));
    const parsed = JSON.parse(json);
    // Merge with existing data
    const existing = JSON.parse(localStorage.getItem('deathnote_v3') || '{}');
    const merged = {...existing, ...parsed};
    localStorage.setItem('deathnote_v3', JSON.stringify(merged));
    db = merged;
    closeModal('importModal');
    renderGroups();
    alert('✓ Import successful! ' + Object.keys(parsed).length + ' date(s) imported.');
  } catch(e) {
    alert('Invalid code. Please try again.');
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}
